<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FOUND VIDEO VJ BATTLE ROYALE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="battle" role="application" aria-label="VJ Battle Royale archive">
    <section class="battle__side battle__side--left" aria-label="Red team diary">
      <div class="monitor">
        <div class="monitor__bezel">
          <div class="monitor__screen">
            <p id="red-vj-name" class="diary__name" hidden></p>
            <div id="red-diary" class="diary" tabindex="0"></div>
          </div>
        </div>
      </div>
    </section>

    <aside class="hud" aria-label="Battle HUD">
      <div class="hud__stage">
        <!-- Bottom layer: single sunburst + title -->
        <div class="hud__bg">
          <div class="hud__sunburst" aria-hidden="true"></div>
          <h1 class="hud__title" aria-label="Found Video VJ Battle Royale">
            <span class="hud__title-line">FOUND</span>
            <span class="hud__title-line">VIDEO</span>
            <span class="hud__title-line">VJ</span>
            <span class="hud__title-line">BATTLE</span>
            <span class="hud__title-line">ROYALE</span>
          </h1>
        </div>

        <!-- Top layer: interactive HUD -->
        <div class="hud__ui">
          <div class="bezel bezel--sm">
            <div class="bezel__inner bezel__inner--white">
              <span id="round-label" class="hud__round">Round 1</span>
            </div>
          </div>

          <div class="bezel bezel--sm">
            <div class="bezel__inner bezel__inner--white">
              <span id="round-timer" class="hud__timer">00:01</span>
            </div>
          </div>

          <div class="bezel bezel--scores">
            <div class="hud__scores">
              <div class="hud__score hud__score--red">
                <span class="hud__team">Red</span>
                <span id="red-score" class="hud__num">1</span>
              </div>
              <div class="hud__score hud__score--blue">
                <span class="hud__team">Blue</span>
                <span id="blue-score" class="hud__num">1</span>
              </div>
            </div>
          </div>

          <div class="bezel bezel--meters">
            <div class="hud__meters">
              <div class="hud__meter-slot">
                <div id="meter-red" class="hud__meter hud__meter--red"></div>
              </div>
              <div class="hud__meter-slot">
                <div id="meter-blue" class="hud__meter hud__meter--blue"></div>
              </div>
            </div>
          </div>

          <nav class="hud__nav" aria-label="Round navigation">
            <button type="button" id="btn-prev" class="hud__nav-btn" aria-label="Previous round">◀</button>
            <button type="button" id="btn-next" class="hud__nav-btn" aria-label="Next round">▶</button>
          </nav>
        </div>
      </div>
    </aside>

    <section class="battle__side battle__side--right" aria-label="Blue team diary">
      <div class="monitor">
        <div class="monitor__bezel">
          <div class="monitor__screen">
            <p id="blue-vj-name" class="diary__name" hidden></p>
            <div id="blue-diary" class="diary" tabindex="0"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="data/rounds.js"></script>
  <script src="app.js"></script>
</body>
</html>
