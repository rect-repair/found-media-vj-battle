<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FOUND VIDEO VJ BATTLE ROYALE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js" defer></script>
  <!-- <script src="https://cdn.jsdelivr.net/npm/p5@1.11.10/lib/p5.js"></script> -->
  <script src="p5.js"></script>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div id="p5-canvas-container"></div>
  <div id="not-p5">
    <div class="battle-screen" role="application" aria-label="VJ Battle Royale archive">
      <!-- Left: Red team diary panel -->
      <section class="panel panel--red" aria-label="Red team diary">
        <div class="panel__outer">
          <div class="panel__screen panel__screen--green">
            <div class="panel__label">
              <header id="red-vj-name" class="panel__inner panel__label--red">RED</header>
            </div>
            <div class="panel__content">
              <div id="red-diary" class="panel__diary" tabindex="0"></div>
              <div class="video-wrapper" id="red-video-wrapper">
                <div class="channel">
                  <p class="channel__title" id="red-ch-title"></p>
                  <div class="vid-shell" id="red-vid-shell">
                    <iframe id="red-video" class="youtube-embed" src="" title="Red VJ clip"
                      allow="autoplay; fullscreen; picture-in-picture; encrypted-media" loading="lazy"
                      allowfullscreen></iframe>
                    <div class="vid-ctrl" id="red-vid-ctrl" hidden>
                      <button class="vid-ctrl__btn vid-ctrl__play" id="red-vid-play" type="button" aria-label="Play/Pause">▶</button>
                      <div class="vid-ctrl__bar" id="red-vid-bar"><div class="vid-ctrl__bar-fill" id="red-vid-fill"></div></div>
                      <button class="vid-ctrl__btn vid-ctrl__fs" id="red-vid-fs" type="button" aria-label="Fullscreen">⛶</button>
                    </div>
                  </div>
                  <div class="channel__switcher" id="red-channel">
                    <div class="outer channel__btn-outer">
                      <div class="channel__btn-border">
                        <button type="button" id="red-ch-prev" class="channel__btn"
                          aria-label="Previous clip">◀</button>
                      </div>
                    </div>
                    <span class="channel__label">VID <span id="red-ch-num">01</span>/<span
                        id="red-ch-total">01</span></span>
                    <div class="outer channel__btn-outer">
                      <div class="channel__btn-border">
                        <button type="button" id="red-ch-next" class="channel__btn" aria-label="Next clip">▶</button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- Center: Tetris-style HUD -->
      <aside class="hud" aria-label="Battle HUD">

        <nav class="hud__nav" aria-label="Round navigation">
          <div class="outer hud__outer">
            <div class="hud__border">
              <button type="button" id="btn-prev" class="hud__btn" aria-label="Previous round">◀</button>
            </div>
          </div>
          <div class="outer hud__outer">
            <div class="hud__round-box">
              <div class="inner hud__inner">
                <span class="hud__round-text" id="round-label">Round 1</span>
              </div>
            </div>
          </div>
          <div class="outer hud__outer">
            <div class="hud__border">
              <button type="button" id="btn-next" class="hud__btn" aria-label="Next round">▶</button>
            </div>
          </div>
        </nav>


        <div class="hud__scores">
          <div class="outer hud__outer">
            <div class="hud__border">
              <div class="hud__score hud__score--red">
                <span class="hud__team">Red</span>
                <span id="red-score" class="hud__points">1</span>
              </div>
            </div>
          </div>
          <div class="outer hud__outer">
            <div class="hud__border">
              <div class="hud__score hud__score--blue">
                <span class="hud__team">Blue</span>
                <span id="blue-score" class="hud__points">1</span>
              </div>
            </div>
          </div>
        </div>

        <h1 class="hud__title" aria-label="Found Video VJ Battle Royale">
          <span class="hud__title-line">FOUND</span>
          <span class="hud__title-line">VIDEO</span>
          <span class="hud__title-line hud__title-line--vj">VJ</span>
          <span class="hud__title-line">BATTLE</span>
          <span class="hud__title-line hud__title-line--sm">ROYALE</span>
        </h1>

        <div class="hud__meters" aria-hidden="true">
          <div class="outer hud__outer" id="meter-red">
            <div class="hud__border">
              <div class="hud__meter hud__meter--red"></div>
            </div>
          </div>
          <div class="outer hud__outer" id="meter-blue">
            <div class="hud__border">
              <div class="hud__meter hud__meter--blue"></div>
            </div>
          </div>
        </div>

        <!-- <p class="hud__venue">← → arrow keys to change round</p> -->
      </aside>

      <!-- Right: Blue team diary panel -->
      <section class="panel panel--blue" aria-label="Blue team diary">
        <div class="panel__outer">
          <div class="panel__screen panel__screen--green">
            <div class="panel__label">
              <header id="blue-vj-name" class="panel__inner panel__label--blue">BLUE</header>
            </div>
            <div class="panel__content">
              <div id="blue-diary" class="panel__diary" tabindex="0"></div>
              <div class="video-wrapper" id="blue-video-wrapper">
                <div class="channel">
                  <p class="channel__title" id="blue-ch-title"></p>
                  <div class="vid-shell" id="blue-vid-shell">
                    <iframe id="blue-video" class="youtube-embed" src="" title="Blue VJ clip"
                      allow="autoplay; fullscreen; picture-in-picture; encrypted-media" loading="lazy"
                      allowfullscreen></iframe>
                    <div class="vid-ctrl" id="blue-vid-ctrl" hidden>
                      <button class="vid-ctrl__btn vid-ctrl__play" id="blue-vid-play" type="button" aria-label="Play/Pause">▶</button>
                      <div class="vid-ctrl__bar" id="blue-vid-bar"><div class="vid-ctrl__bar-fill" id="blue-vid-fill"></div></div>
                      <button class="vid-ctrl__btn vid-ctrl__fs" id="blue-vid-fs" type="button" aria-label="Fullscreen">⛶</button>
                    </div>
                  </div>
                  <div class="channel__switcher" id="blue-channel">
                    <div class="outer channel__btn-outer">
                      <div class="channel__btn-border">
                        <button type="button" id="blue-ch-prev" class="channel__btn"
                          aria-label="Previous clip">◀</button>
                      </div>
                    </div>
                    <span class="channel__label">VID <span id="blue-ch-num">01</span>/<span
                        id="blue-ch-total">01</span></span>
                    <div class="outer channel__btn-outer">
                      <div class="channel__btn-border">
                        <button type="button" id="blue-ch-next" class="channel__btn" aria-label="Next clip">▶</button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>

    <footer class="site-footer">
      <!-- <p>24 VJs · 12 rounds · archived battle diaries</p> -->
      <span class="site-footer__hint">[[rect*]]repair x UFO TERMINAL
        // 2026.4.26 // by joanna, viola, chen xin</span>
    </footer>

  </div>

  <script src="sketch.js"></script>
  <script src="data/rounds.js"></script>
  <script src="app.js"></script>
</body>

</html>
